<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astir review notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .review-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .review-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-6);
      background: var(--rail);
      border-bottom: var(--border-thin) solid var(--line);
    }

    .review-title {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .review-title strong {
      font-family: var(--font-display);
      font-size: var(--type-brand);
      font-weight: var(--weight-display);
    }

    .review-title span {
      color: var(--muted);
      font-size: var(--type-secondary);
    }

    .review-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .review-btn {
      min-height: var(--space-8);
      padding: var(--space-2) var(--space-4);
      border: var(--border-thin) solid var(--line2);
      border-radius: var(--r-pill);
      background: transparent;
      color: var(--ink2);
      font-size: var(--type-control);
      font-weight: var(--weight-medium);
    }

    .review-btn.primary,
    .review-btn.active {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--on-gold);
    }

    .review-stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--paper);
    }

    .review-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .review-layer.annotating {
      cursor: crosshair;
      pointer-events: auto;
    }

    .pin {
      position: absolute;
      display: grid;
      place-items: center;
      width: var(--dot-size);
      height: var(--dot-size);
      border: var(--border-thin) solid var(--gold-deep);
      border-radius: var(--r-pill);
      background: var(--gold);
      color: var(--on-gold);
      box-shadow: var(--shadow-card);
      font-size: var(--type-secondary);
      font-weight: var(--weight-medium);
      transform: translate(-50%, -50%);
      pointer-events: auto;
    }

    .note-card {
      position: fixed;
      width: min(320px, calc(100vw - var(--space-12)));
      padding: var(--space-4);
      border: var(--border-thin) solid var(--line);
      border-radius: var(--r-md);
      background: var(--card);
      box-shadow: var(--shadow-modal);
      transform: translate(var(--space-4), var(--space-4));
      pointer-events: auto;
    }

    .note-card textarea,
    .export-box textarea {
      width: 100%;
      min-height: 120px;
      padding: var(--space-3);
      border: var(--border-thin) solid var(--line2);
      border-radius: var(--input-radius);
      outline: none;
      background: var(--paper);
      color: var(--ink);
      resize: vertical;
    }

    .note-card textarea:focus,
    .export-box textarea:focus {
      border-color: var(--gold);
      box-shadow: var(--focus-ring);
    }

    .note-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    .export-box {
      position: fixed;
      right: var(--space-6);
      bottom: var(--space-6);
      width: min(520px, calc(100vw - var(--space-12)));
      padding: var(--space-4);
      border: var(--border-thin) solid var(--line);
      border-radius: var(--r-lg);
      background: var(--card);
      box-shadow: var(--shadow-modal);
    }

    .export-box h2 {
      margin-bottom: var(--space-3);
      font-family: var(--font-display);
      font-size: var(--type-modal-title);
      font-weight: var(--weight-display);
    }

    .export-box p {
      margin-bottom: var(--space-3);
      color: var(--muted);
      font-size: var(--type-secondary);
    }

    .export-box[hidden],
    .note-card[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <div class="review-shell">
    <header class="review-bar">
      <div class="review-title">
        <strong>Astir review notes</strong>
        <span>Turn annotate on, click the UI, then type the change.</span>
      </div>
      <div class="review-actions">
        <button class="review-btn primary" id="toggleAnnotate" type="button">Annotate</button>
        <button class="review-btn" id="exportNotes" type="button">Export notes</button>
        <button class="review-btn" id="clearNotes" type="button">Clear notes</button>
      </div>
    </header>

    <main class="review-stage">
      <iframe id="appFrame" src="index.html" title="Astir Today"></iframe>
      <div class="review-layer annotating" id="reviewLayer"></div>
    </main>
  </div>

  <form class="note-card" id="noteCard" hidden>
    <textarea id="noteText" placeholder="Type the change here"></textarea>
    <div class="note-actions">
      <button class="review-btn" id="cancelNote" type="button">Cancel</button>
      <button class="review-btn primary" type="submit">Save note</button>
    </div>
  </form>

  <section class="export-box" id="exportBox" hidden>
    <h2>Notes for Codex</h2>
    <p>Paste this back into chat and I can implement from it.</p>
    <textarea id="exportText" readonly></textarea>
    <div class="note-actions">
      <button class="review-btn" id="copyNotes" type="button">Copy</button>
      <button class="review-btn primary" id="closeExport" type="button">Done</button>
    </div>
  </section>

  <script>
    (function () {
      const storageKey = "astir.review.notes";
      const layer = document.getElementById("reviewLayer");
      const noteCard = document.getElementById("noteCard");
      const noteText = document.getElementById("noteText");
      const toggleAnnotate = document.getElementById("toggleAnnotate");
      const exportNotes = document.getElementById("exportNotes");
      const clearNotes = document.getElementById("clearNotes");
      const cancelNote = document.getElementById("cancelNote");
      const exportBox = document.getElementById("exportBox");
      const exportText = document.getElementById("exportText");
      const copyNotes = document.getElementById("copyNotes");
      const closeExport = document.getElementById("closeExport");
      let notes = loadNotes();
      let draft = null;
      let annotating = true;

      function loadNotes() {
        try {
          return JSON.parse(localStorage.getItem(storageKey)) || [];
        } catch {
          return [];
        }
      }

      function saveNotes() {
        localStorage.setItem(storageKey, JSON.stringify(notes));
      }

      function renderPins() {
        layer.querySelectorAll(".pin").forEach((pin) => pin.remove());
        notes.forEach((note, index) => {
          const pin = document.createElement("button");
          pin.className = "pin";
          pin.type = "button";
          pin.style.left = `${note.x}%`;
          pin.style.top = `${note.y}%`;
          pin.textContent = "•";
          pin.setAttribute("aria-label", note.text);
          pin.addEventListener("click", (event) => {
            event.stopPropagation();
            openDraft(note.x, note.y, index);
          });
          layer.appendChild(pin);
        });
      }

      function openDraft(x, y, index) {
        const rect = layer.getBoundingClientRect();
        draft = { x, y, index };
        noteText.value = index >= 0 ? notes[index].text : "";
        noteCard.style.left = `${rect.left + (rect.width * x) / 100}px`;
        noteCard.style.top = `${rect.top + (rect.height * y) / 100}px`;
        noteCard.hidden = false;
        noteText.focus();
      }

      function closeDraft() {
        draft = null;
        noteCard.hidden = true;
        noteText.value = "";
      }

      function toMarkdown() {
        if (!notes.length) {
          return "Astir review notes\n\nNo notes yet.";
        }

        return [
          "Astir review notes",
          "",
          ...notes.map((note) => `- Position ${note.x.toFixed(1)}% from left, ${note.y.toFixed(1)}% from top: ${note.text}`)
        ].join("\n");
      }

      layer.addEventListener("click", (event) => {
        if (!annotating || event.target !== layer) {
          return;
        }
        const rect = layer.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width) * 100;
        const y = ((event.clientY - rect.top) / rect.height) * 100;
        openDraft(x, y, -1);
      });

      noteCard.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = noteText.value.trim();
        if (!text || !draft) {
          closeDraft();
          return;
        }
        if (draft.index >= 0) {
          notes[draft.index].text = text;
        } else {
          notes.push({ x: draft.x, y: draft.y, text });
        }
        saveNotes();
        renderPins();
        closeDraft();
      });

      cancelNote.addEventListener("click", closeDraft);

      toggleAnnotate.addEventListener("click", () => {
        annotating = !annotating;
        layer.classList.toggle("annotating", annotating);
        toggleAnnotate.classList.toggle("active", annotating);
      });

      exportNotes.addEventListener("click", () => {
        exportText.value = toMarkdown();
        exportBox.hidden = false;
        exportText.select();
      });

      closeExport.addEventListener("click", () => {
        exportBox.hidden = true;
      });

      copyNotes.addEventListener("click", async () => {
        exportText.select();
        await navigator.clipboard.writeText(exportText.value);
      });

      clearNotes.addEventListener("click", () => {
        notes = [];
        saveNotes();
        renderPins();
        closeDraft();
      });

      renderPins();
    })();
  </script>
</body>
</html>
